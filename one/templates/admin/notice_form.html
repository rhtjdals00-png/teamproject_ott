{% extends 'admin/admin_base.html' %}

{% block title %}
    {% if mode == 'create' %}공지사항 등록{% else %}공지사항 수정{% endif %}
{% endblock %}

{% block content %}

<h1>
    {% if mode == 'create' %}공지사항 등록{% else %}공지사항 수정{% endif %}
</h1>

<form method="post" class="content_form">

    <div class="content_form_group">
        <label for="title">제목</label>
        <input type="text" id="title" name="title"
               value="{{ notice.title if notice else '' }}" required>
    </div>

    <div class="content_form_group">
        <label for="content">내용</label>
        <textarea id="content" name="content" rows="8" required>{{ notice.content if notice else '' }}</textarea>
    </div>

    <div class="content_form_group">
        <label for="is_pinned">상단 고정</label>
        <select id="is_pinned" name="is_pinned">
            <option value="0" {% if not notice or not notice.is_pinned %}selected{% endif %}>일반</option>
            <option value="1" {% if notice and notice.is_pinned %}selected{% endif %}>고정</option>
        </select>
    </div>

    <div class="content_form_actions">
        <button type="submit" class="content_save_btn">
            {% if mode == 'create' %}등록{% else %}수정{% endif %}
        </button>
        <a href="{{ url_for('admin.notice_list') }}" class="content_cancel_btn">취소</a>
    </div>

</form>

{% endblock %}
