<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}관리자 페이지{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin_wrap">

    <!-- 사이드바 -->
    <aside class="admin_sidebar">
        <h2>
            <a href="{{ url_for('admin.admin_main') }}" class="admin_title">관리자</a>
        </h2>

        <ul>
            <li>
                <a href="{{ url_for('admin.member_list') }}"
                   class="{% if 'member' in request.endpoint %}active{% endif %}">
                    회원 관리
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.content_list') }}"
                   class="{% if 'content' in request.endpoint %}active{% endif %}">
                    콘텐츠 관리
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.inquiry_list') }}"
                   class="{% if 'inquiry' in request.endpoint %}active{% endif %}">
                    문의 관리
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.review_list') }}"
                   class="{% if 'review' in request.endpoint %}active{% endif %}">
                    리뷰 관리
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.notice_list') }}"
                   class="{% if 'notice' in request.endpoint %}active{% endif %}">
                    공지사항 관리
                </a>
            </li>
        </ul>
    </aside>

    <!-- 메인 -->
    <main class="admin_content">

        <!-- 공통 상단 (관리자 이름 + 로그아웃) -->
        <div class="admin_topbar">
            {% if session.get('is_admin') %}
            <span class="admin_name">
                {{ session.get('admin_name') }}님
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn_logout">로그아웃</a>
            {% endif %}
        </div>

        <!-- 페이지마다 바뀌는 영역 -->
        {% block content %}
        {% endblock %}

    </main>

</div>

{% block scripts %}{% endblock %}

</body>
</html>
