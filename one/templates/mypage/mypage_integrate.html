{% extends "base.html" %}

{% block title %}
    계정통합
{% endblock %}

{% block styles %}
 <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage_change.css') }}">
{% endblock %}

{% block content %}
<section class="change-info-section">
    <div class="change-card">
        <h2 class="section-title">계정 정보 통합</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 20px;">
            보안을 위해 <strong>비밀번호</strong>를 설정하고 추가 정보를 입력해 주세요.
        </p>

        <form method="POST" action="{{ url_for('mypage.change_info') }}" class="edit-form" onsubmit="return validateForm()">
            <!-- 이름 -->
            <div class="input-group">
                <label>이름</label>
                <input type="text" name="user_name" placeholder="이름을 입력하세요" required>
            </div>

            <!-- 이메일 (읽기전용) -->
            <div class="input-group">
                <label>이메일</label>
                <input type="email" value="{{ user.user_email }}" readonly class="readonly-input">
            </div>

            <!-- 비밀번호 설정 (1차) -->
            <div class="input-group">
                <label>새 비밀번호 설정</label>
                <input type="password" name="user_password" id="pw1" placeholder="사용할 비밀번호를 입력하세요" required>
            </div>

            <!-- 비밀번호 확인 (2차) -->
             <div class="input-group">
                <label>비밀번호 확인</label>
                <input type="password" name="confirm_password" id="pw2" placeholder="비밀번호를 한 번 더 입력하세요" required>
                <small id="pw_msg" style="color: #ff153c; display: none;">비밀번호가 일치하지 않습니다.</small>
            </div>

            <!-- 전화번호 -->
            <div class="input-group">
                <label>전화번호</label>
                <input type="text" name="user_phone" placeholder="010-0000-0000" required>
            </div>

            <!-- 생년월일 -->
            <div class="input-group">
                <label>생년월일</label>
                <input type="date" name="user_birth" class="custom-date-input" required>
            </div>

            <!-- 성별 추가 (모델에 있으므로) -->
            <div class="input-group">
                <label>성별</label>
                <div class="gender-selection-wrapper">
                    <label class="gender-label">
                        <input type="radio" name="user_gender" value="M" checked>
                        <span class="gender-custom-btn">남성</span>
                    </label>
                    <label class="gender-label">
                        <input type="radio" name="user_gender" value="F">
                        <span class="gender-custom-btn">여성</span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
               <button type="submit"
                        id="save_btn"
                        class="save-btn"
                        data-email="{{ user.user_email }}"
                        data-method="{{ user.signup_method }}"
                        disabled>
                    정보 저장 및 통합 완료
                </button>
                <a href="{{ url_for('mypage.mypage') }}" class="cancel-btn">나중에 하기</a>
            </div>
        </form>
    </div>
</section>

{% endblock %}
{% block script %}
<script src="{{ url_for('static', filename='js/mypage_change.js') }}"></script>
{% endblock %}
